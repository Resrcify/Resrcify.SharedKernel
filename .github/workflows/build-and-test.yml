# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: build-and-test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_call:

jobs:
  build:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.x.x
      - name: Restore dependencies
        run: dotnet restore Resrcify.SharedKernel.slnx -m:1
      - name: Build
        run: dotnet build Resrcify.SharedKernel.slnx --no-restore -m:1
      - name: Test
        run: dotnet test Resrcify.SharedKernel.slnx --no-build --verbosity normal -m:1
